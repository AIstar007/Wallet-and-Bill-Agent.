services:
  - type: web
    name: wallet-bill-agent-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: "2024-02-15-preview"
      - key: AZURE_OPENAI_API_DEPLOYMENT
        sync: false
      - key: DATABASE_URL
        sync: false
        # Point this at a managed Postgres instance for anything beyond a
        # demo — SQLite works locally but Render's filesystem isn't
        # persistent across deploys.
